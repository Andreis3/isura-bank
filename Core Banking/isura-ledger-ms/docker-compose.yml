services:
  postgres:
    image: postgres:18.3
    container_name: isura-ledger-postgres
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d isura-ledger"]
      interval: 5s
      timeout: 2s
      retries: 5
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: isura-ledger
    ports:
      - "5432:5432"
    command: ["postgres", "-c", "synchronous_commit=off"]


volumes:
  ledger-data: